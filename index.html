<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --bg: #0d2348;
        --panel: #172f5d;
        --panel-dark: #10274d;
        --right: #112954;
        --line: #2b456e;
        --gold: #d9b449;
        --text: #f4f6fb;
        --card: #081827;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: grid;
        grid-template-columns: 80px 1fr 300px;
        height: 100vh;
        overflow: hidden;
      }

      .sidebar-left {
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 0;
        background-color: var(--panel-dark);
        position: relative;
        z-index: 20;
      }

      .logo {
        width: 40px;
        height: 40px;
        background: linear-gradient(
          135deg,
          #dae9ff 0 30%,
          #d4a340 30% 63%,
          #78a66f 63% 100%
        );
        border-radius: 50%;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(255, 255, 255, 0.15);
        font-size: 0;
        text-decoration: none;
      }

      .menu-icon {
        font-size: 28px;
        color: white;
        cursor: pointer;
        margin-bottom: auto;
        transition: color 0.2s;
      }

      .menu-icon:hover {
        color: #ccc;
      }

      .search-icon {
        font-size: 20px;
        color: white;
        cursor: pointer;
        margin-bottom: 20px;
      }

      .nav-menu {
        position: fixed;
        top: 0;
        left: 80px;
        bottom: 0;
        width: 250px;
        background-color: #0c1c38;
        border-right: 1px solid var(--line);
        box-shadow: 18px 0 40px rgba(0, 0, 0, 0.28);
        z-index: 10;
        transform: translateX(-100%);
        transition: transform 0.3s ease-in-out;
        padding-top: 80px;
      }

      .nav-menu.active {
        transform: translateX(0);
      }

      .nav-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .nav-list li {
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .nav-list a {
        display: block;
        padding: 18px 25px;
        color: white;
        text-decoration: none;
        font-size: 1.1rem;
        transition: background-color 0.2s;
      }

      .nav-list a:hover {
        background-color: rgba(255, 255, 255, 0.05);
      }

      /* --- Main Content Area --- */
      .main-content {
        display: flex;
        flex-direction: column;
        padding: 20px 40px 0 40px;
        overflow-y: auto;
        position: relative;
        z-index: 1;
        background-color: var(--panel);
      }

      .page-title {
        color: var(--gold);
        text-align: center;
        font-size: 2.2rem;
        margin-top: 0;
        margin-bottom: 30px;
        letter-spacing: 1px;
        display: inline-block;
        align-self: center;
        padding: 8px 18px 10px;
      }

      .content-section {
        margin-bottom: 20px;
      }

      .img-placeholder {
        background-color: #6f89aa;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        color: white;
        float: left;
        margin-right: 20px;
        margin-bottom: 10px;
        overflow: hidden;
      }

      .mem-box-1 {
        margin-left: auto;
        margin-right: auto;
        width: 240px;
        height: 240px;
        border-radius: 900%;
      }

      .img-box-2 {
        width: 50%;
        height: 240px;
      }

      .text-block {
        font-size: 0.95rem;
        line-height: 1.6;
        margin-bottom: 15px;
        color: #f2f4f8;
      }

      .clearfix::after {
        content: "";
        clear: both;
        display: table;
      }

      /* --- Social Footer --- */
      .social-footer {
        margin-top: auto;
        padding: 30px 0;
        display: flex;
        justify-content: space-around;
        align-items: center;
      }

      .social-icon {
        width: 45px;
        height: 45px;
        border: 2px solid white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: white;
        text-decoration: none;
        transition: all 0.3s ease;
      }

      .social-icon:hover {
        background-color: white;
        color: var(--bg);
      }

      /* --- Right Sidebar --- */
      .sidebar-right {
        border-left: 1px solid var(--line);
        padding: 20px;
        display: flex;
        flex-direction: column;
        background: linear-gradient(180deg, #122d5a, #10264f);
      }

      .sidebar-title {
        color: var(--gold);
        font-size: 2rem;
        margin-top: 0;
        margin-bottom: 20px;
		text-align:center;
      }
	  
	.main-container{
		display:block;
		justify-content:space-between;
		align-items:center;
		gap:20px;
	}

	.containers{	
		text-align:center;
		width:250px;
		height:250px;
	}

	.container-image img{
		width: 100%;
		height: 180px;
		object-fit: cover;
		display: block;
		border-radius:10%;
	}
	.container-image img:hover{
		transform: scale(1.05);
		z-index: 10;
		position: relative; 
	}	
	
	.container-desc h2{
		margin-top:0px;
	}
	
	.container-desc{
		height:70px;
	}
	
	.container-desc a{
		font-size: 1rem;
        color: var(--text);
        text-decoration: none;
	}
	
	.container-desc a:hover{
		text-decoration:underline;
		color: var(--gold);
	}

		  
    </style>
  </head>
  <body>
    <nav class="sidebar-left">
      <a href="#" class="logo">Logo</a>
      <i class="fa-solid fa-bars menu-icon" id="hamburgerBtn"></i>
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
    </nav>

    <nav class="nav-menu" id="navMenu">
      <ul class="nav-list">
        <li><a href="#">Tragedies</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">About</a></li>
      </ul>
    </nav>

    <main class="main-content">
      <h1 class="page-title">Template</h1>
    </main>

    <aside class="sidebar-right">
      <h2 class="sidebar-title">Recent Stories</h2>
	  <div class="main-container">
			<div class="containers">
				<div class="container-image">
					<a href="Music_Page.html"><img src="https://images.macrumors.com/t/hi1_a2IdFGRGMsJ0x31SdD_IcRk=/1600x/article-new/2018/05/apple-music-note.jpg" alt="Music image" title="Go to Music list"></a>
				</div>
				<div class="container-desc">
					<h2><a href="Music.html" title="Go to Music list">Recent Story 1</a></h2>
				</div>
			</div>
			
			<div class="containers">
				<div class="container-image">
					<a href="Music_Page.html"><img src="https://images.macrumors.com/t/hi1_a2IdFGRGMsJ0x31SdD_IcRk=/1600x/article-new/2018/05/apple-music-note.jpg" alt="Music image" title="Go to Music list"></a>
				</div>
				<div class="container-desc">
					<h2><a href="Music.html" title="Go to Music list">Recent Story 2</a></h2>
				</div>
			</div>
			
			<div class="containers">
				<div class="container-image">
					<a href="Music_Page.html"><img src="https://images.macrumors.com/t/hi1_a2IdFGRGMsJ0x31SdD_IcRk=/1600x/article-new/2018/05/apple-music-note.jpg" alt="Music image" title="Go to Music list"></a>
				</div>
				<div class="container-desc">
					<h2><a href="Music.html" title="Go to Music list">Recent Story 3</a></h2>
				</div>
			</div>
		</div>
	  </div>
    </aside>

    <script>
      const hamburgerBtn = document.getElementById("hamburgerBtn");
      const navMenu = document.getElementById("navMenu");

      hamburgerBtn.addEventListener("click", () => {
        navMenu.classList.toggle("active");
      });

      document.addEventListener("click", (event) => {
        if (
          !navMenu.contains(event.target) &&
          !hamburgerBtn.contains(event.target)
        ) {
          navMenu.classList.remove("active");
        }
      });
    </script>
  </body>
</html>
