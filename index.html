<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="./CSS/index.css">

</head>

<body>

    <div class="container">

            <div class="group-1">
                <img src="ASSETS/IMAGES/logo.png" alt="stragedy-logo" width="85" height="80">
                <img class="hamburger-menu clickable" src="ASSETS/IMAGES/hamburger-menu.svg" alt="hamburger-menu"

        <div class="main-content child-container">

        </div>

    <script>
        const hamburgerMenu = document.querySelector(".hamburger-menu");
        const navPopup = document.querySelector(".nav-popup");
        const navMenu = document.querySelector(".nav-menu")
        console.log(navPopup);

        hamburgerMenu.addEventListener("click", () => {

            navMenu.classList.toggle("remove-right-border");
