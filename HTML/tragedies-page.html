    <script>
			// Run when page loads → show all
		window.onload = function () {
		  filterSelection();

		  var checkboxes = document.getElementsByName("filter");

		  for (var i = 0; i < checkboxes.length; i++) {
			checkboxes[i].addEventListener("change", filterSelection);
		  }
		};
		function filterSelection() {
		  var items = document.getElementsByClassName("filterDiv");
		  var checkboxes = document.getElementsByName("filter");
		  var activeFilters = [];

		  // Collect checked filters
		  for (var i = 0; i < checkboxes.length; i++) {
			if (checkboxes[i].checked) {
			  activeFilters.push(checkboxes[i].value);
			}
		  }

		  for (var i = 0; i < items.length; i++) {
			var el = items[i];
			var classes = el.className;

			// ✅ If NOTHING selected → show all
			if (activeFilters.length === 0) {
			  el.classList.add("show");
			  continue;
			}

			// ✅ AND logic
			var show = true;

			for (var j = 0; j < activeFilters.length; j++) {
			  if (classes.indexOf(activeFilters[j]) === -1) {
				show = false;
				break;
			  }
			}

			// ✅ THIS is where your bug was
			if (show) {
			  el.classList.add("show");
			} else {
			  el.classList.remove("show");
			}
		  }
		}
	</script>
